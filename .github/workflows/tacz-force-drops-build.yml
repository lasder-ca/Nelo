name: Build TaCZ Force Drops

on:
  push:
    branches:
      - build/tacz-force-drops-20260723
    paths:
      - '.tmp/tacz-force-drops/**'
      - '.github/workflows/tacz-force-drops-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .tmp/tacz-force-drops
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'
      - name: Build
        run: gradle --no-daemon build
      - uses: actions/upload-artifact@v4
        with:
          name: tacz-force-drops-1.0.0
          path: .tmp/tacz-force-drops/build/libs/tacz-force-drops-1.0.0.jar
          if-no-files-found: error
