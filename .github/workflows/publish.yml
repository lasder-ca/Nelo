name: Publish package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - package.json
      - .github/workflows/publish.yml
      - .npm-publish-trigger
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'lasder-ca/Nelo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Use a trusted-publishing compatible npm CLI
        run: npm install --global npm@latest

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run check:package
      - run: npm run check:tarball

      - name: Publish prerelease to npm
        shell: bash
        run: |
          version="$(node --input-type=module --eval "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"
          if npm view "nelo@${version}" version >/dev/null 2>&1; then
            echo "nelo@${version} is already published"
            exit 0
          fi
          npm publish --access public --tag next --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
