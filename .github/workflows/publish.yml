name: Publish package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - package.json
      - .github/workflows/publish.yml
      - .npm-publish-trigger
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  statuses: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'lasder-ca/Nelo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Validate and publish Nelo
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          set -o pipefail
          log_file="$(mktemp)"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"npm/publish","description":"Validating Nelo before npm publish"}'

          {
            npm install --global npm@latest &&
            npm ci &&
            npm run format:check &&
            npm run lint &&
            npm run typecheck &&
            npm test &&
            npm run build &&
            npm run check:package &&
            npm run check:tarball &&
            version="$(node -p "require('./package.json').version")" &&
            if npm view "nelo@${version}" version >/dev/null 2>&1; then
              echo "nelo@${version} is already published"
            else
              npm publish --access public --tag next --provenance
            fi
          } 2>&1 | tee "${log_file}"
          exit_code=${PIPESTATUS[0]}

          if [ "${exit_code}" -eq 0 ]; then
            state="success"
            description="Nelo prerelease is available on npm"
          else
            state="failure"
            description="$(grep -E 'npm error|error:|Error:' "${log_file}" | tail -n 1 | tr '\n\r\"' '   ' | cut -c1-120)"
            if [ -z "${description}" ]; then
              description="Nelo npm publish failed; inspect the Actions log"
            fi
          fi

          payload="$(node -e 'console.log(JSON.stringify({state: process.argv[1], context: "npm/publish", description: process.argv[2]}))' "${state}" "${description}")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

          exit "${exit_code}"
