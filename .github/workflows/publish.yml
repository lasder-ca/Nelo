name: Publish package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish.yml
      - .npm-publish-trigger
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  statuses: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'lasder-ca/Nelo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Validate and publish Nelo
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          log_file="$(mktemp)"
          failed_stage="unknown"

          run_stage() {
            local stage="$1"
            shift
            echo "==> ${stage}"
            "$@"
            local result=$?
            if [ "${result}" -ne 0 ]; then
              failed_stage="${stage}"
            fi
            return "${result}"
          }

          publish_package() {
            local package_name version npm_user
            npm_user="$(npm whoami)" || return $?
            echo "publishing as ${npm_user}"
            package_name="$(node -p "require('./package.json').name")" || return $?
            version="$(node -p "require('./package.json').version")" || return $?
            if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
              echo "${package_name}@${version} is already published"
              return 0
            fi
            npm publish --access public --tag next --provenance
          }

          {
            run_stage npm-cli npm install --global npm@latest &&
            run_stage install npm ci &&
            run_stage format npm run format:check &&
            run_stage lint npm run lint &&
            run_stage typecheck npm run typecheck &&
            run_stage test npm test &&
            run_stage build npm run build &&
            run_stage package-smoke npm run check:package &&
            run_stage tarball-smoke npm run check:tarball &&
            run_stage publish publish_package
          } >"${log_file}" 2>&1
          exit_code=$?
          cat "${log_file}"

          npm_user="$(sed -n 's/^publishing as //p' "${log_file}" | tail -n 1 | tr -cd 'A-Za-z0-9._-')"
          if [ -z "${npm_user}" ]; then
            npm_user="unknown"
          fi

          if [ "${exit_code}" -eq 0 ]; then
            state="success"
            context="npm/publish (${npm_user})"
            description="Nelo prerelease is available on npm"
          else
            state="failure"
            error_code="$(sed -n 's/^npm error code //p' "${log_file}" | tail -n 1 | tr -cd 'A-Za-z0-9_-')"
            error_detail="$(grep '^npm error' "${log_file}" | grep -v 'npm error code ' | grep -v 'complete log' | head -n 1 | sed 's/^npm error //' | tr '\n\r\"/' '    ' | sed 's/[[:space:]]\+/ /g' | cut -c1-58)"
            if [ -z "${error_code}" ]; then
              error_code="ERROR"
            fi
            if [ -z "${error_detail}" ]; then
              error_detail="publish failed"
            fi
            context="npm/publish (${npm_user}): ${failed_stage}: ${error_code} ${error_detail}"
            description="Nelo npm publish failed"
          fi

          payload="$(node -e 'console.log(JSON.stringify({state: process.argv[1], context: process.argv[2], description: process.argv[3]}))' "${state}" "${context}" "${description}")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

          exit "${exit_code}"
