name: Format documentation branch

on:
  push:
    branches:
      - docs/rewrite-project-copy-20260722

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/rewrite-project-copy-20260722

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format README
        run: deno fmt README.md

      - name: Commit formatted file
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "style: format README"
          git push
