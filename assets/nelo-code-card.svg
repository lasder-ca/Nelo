<svg xmlns="http://www.w3.org/2000/svg" width="1210" height="860" viewBox="0 0 1210 860" role="img" aria-labelledby="title desc"><title id="title">Nelo code example</title><desc id="desc">A Nelo handler with a request-owned task.</desc><defs><linearGradient id="card" x1="0" y1="0" x2="1210" y2="860"><stop stop-color="#FFF"/><stop offset="1" stop-color="#F4F7FB"/></linearGradient><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#10213A" flood-opacity=".12"/></filter></defs><rect x="18" y="18" width="1174" height="824" rx="24" fill="url(#card)" stroke="#D8E0EA" stroke-width="2" filter="url(#shadow)"/><g font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="42"><text x="96" y="136"><tspan fill="#225FC8">import</tspan><tspan fill="#172033"> { Nelo } </tspan><tspan fill="#225FC8">from</tspan><tspan fill="#16896D"> "nelo"</tspan><tspan fill="#172033">;</tspan></text><text x="96" y="252"><tspan fill="#225FC8">const</tspan><tspan fill="#172033"> app = </tspan><tspan fill="#225FC8">new</tspan><tspan fill="#172033"> Nelo();</tspan></text><text x="96" y="368"><tspan fill="#225FC8">app.get</tspan><tspan fill="#172033">(</tspan><tspan fill="#16896D">"/users/:id"</tspan><tspan fill="#172033">, </tspan><tspan fill="#225FC8">async</tspan><tspan fill="#172033"> (c) =&gt; {</tspan></text><text x="150" y="438"><tspan fill="#225FC8">const</tspan><tspan fill="#172033"> user = </tspan><tspan fill="#225FC8">c.fork</tspan><tspan fill="#172033">(</tspan><tspan fill="#16896D">"user"</tspan><tspan fill="#172033">, (signal) =&gt;</tspan></text><text x="204" y="508"><tspan fill="#172033">fetchUser(c.params.id, { </tspan><tspan fill="#C65332">signal</tspan><tspan fill="#172033"> })</tspan></text><text x="150" y="578" fill="#172033">);</text><text x="150" y="664"><tspan fill="#225FC8">return</tspan><tspan fill="#172033"> c.json(</tspan><tspan fill="#225FC8">await</tspan><tspan fill="#172033"> user);</tspan></text><text x="96" y="734" fill="#172033">});</text></g></svg>